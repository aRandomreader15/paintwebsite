<button class="test"></button>

<style>
 .test {display: block;
         margin-left: auto;
         margin-right: auto;
         width: auto; 
	 align-self: center; }

.test {
  width: 100px;
  height: 100px;
  background-color: white;
  position: relative;
  animation-name: myAnimation;
  animation-duration: 7s;
  animation-delay: 0s;
  border: none;
  animation-fill-mode: forwards;
  animation-iteration-count: 3}

@keyframes myAnimation {
  0%   {background-color:red; left:-400px; top:0px; }
  12.5% {background-color:orange; left: -100px; top: 0px;}
  25%  {background-color:yellow; left:200px; top:0px;}
  37.5% {background-color:green; left:200px; top:300px;}
  50%  {background-color:blue; left:200px; top:600px;}
  62.5% {background-color:purple; left:-100px; top:600px;}
  75%  {background-color:pink; left:-400px; top:600px;}
  87.5% {background-color:white; left:-400px; top:300px;}
  99%  {background-color:grey; left:-400px; top:0px; opacity: 100;}
  100% {left:-400px; top:0px; opacity: 0;}
}
</style>

<button class="move">lift the gate before the square hits it!</button>
<style>
 
.move {
  height: 250px;
  background-color: #198fe6; 
  color: white;
  transition: height 1s;
  border: none;}

 .move {display: block;
         margin-left: auto;
         margin-right: auto;
         width: 100px;
	 margin-top: 20%; 
	 align-self: center; }

.move:hover {
  height: 100px;
}

</style> 


<button class="go">lift the gate before the square hits it!</button>
<style>
.go {
  width: 250px;
  background-color: #198fe6; 
  color: white;
  transition: width 1s;
  border: none;}

 .go {display: block;
         margin-left: 20%;
         margin-right: auto;
         height: 100px;
	 margin-top: -20%; 
	 align-self: center; }

.go:hover {
  width: 100px;
}
</style>
